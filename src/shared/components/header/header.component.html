<header class="border-b">
  <div class="flex justify-between items-center py-4 px-6">
    <!-- Logo -->
    <div>
      <img src="assets/frontend_assets/logo.png" alt="Company Logo" class="h-12 w-auto" />
    </div>

    <!-- Desktop Menu -->
    <nav class="hidden md:flex gap-6 font-medium">
      <a routerLink="/" class="relative group">
        <span>Home</span>
        <span
          class="absolute left-0 -bottom-1 w-0 h-[2px] bg-gray-700 transition-all duration-300 group-hover:w-full"
        ></span>
      </a>

      <a routerLink="/collection" class="relative group">
        <span>Collection</span>
        <span
          class="absolute left-0 -bottom-1 w-0 h-[2px] bg-gray-700 transition-all duration-300 group-hover:w-full"
        ></span>
      </a>

      <a routerLink="/about" class="relative group">
        <span>About</span>
        <span
          class="absolute left-0 -bottom-1 w-0 h-[2px] bg-gray-700 transition-all duration-300 group-hover:w-full"
        ></span>
      </a>

      <a routerLink="/contact" class="relative group">
        <span>Contact</span>
        <span
          class="absolute left-0 -bottom-1 w-0 h-[2px] bg-gray-700 transition-all duration-300 group-hover:w-full"
        ></span>
      </a>
    </nav>

    <!-- Icons -->
    <div class="flex gap-4 items-center">
      <img
        src="assets/frontend_assets/search_icon.png"
        alt="Search"
        class="w-6 h-6 cursor-pointer"
      />

      <a routerLink="/profile">
        <img
          src="assets/frontend_assets/profile_icon.png"
          alt="Profile"
          class="w-6 h-6 cursor-pointer"
        />
      </a>

      <a routerLink="/cart">
        <img src="assets/frontend_assets/cart_icon.png" alt="Cart" class="w-6 h-6 cursor-pointer" />
      </a>

      <!-- Mobile Menu Button -->
      <button class="md:hidden" (click)="isMenuOpen = !isMenuOpen">☰</button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <nav class="md:hidden flex flex-col px-6 pb-4 gap-4 font-medium">
      <a routerLink="/" (click)="isMenuOpen = false">Home</a>
      <a routerLink="/collection" (click)="isMenuOpen = false">Collection</a>
      <a routerLink="/about" (click)="isMenuOpen = false">About</a>
      <a routerLink="/contact" (click)="isMenuOpen = false">Contact</a>
      <a routerLink="/profile" (click)="isMenuOpen = false">Profile</a>
    </nav>
  }
</header>

<app-mega-menu></app-mega-menu>

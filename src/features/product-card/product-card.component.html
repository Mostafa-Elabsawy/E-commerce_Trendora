
<a class="block w-full">
  <div class="overflow-hidden rounded-lg">
    <img
      src="assets/frontend_assets/hero_img.png"
      alt="product image"
      class="w-full h-48 sm:h-60 object-cover transition-all duration-300 hover:scale-110"
    />
  </div>

  <div class="mt-3">
    <p class="text-sm sm:text-base font-medium truncate">
      {{ title }}
    </p>

    <p class="text-xs sm:text-sm text-gray-500">
      {{ category }}
    </p>

    <p class="text-sm sm:text-base font-semibold mt-1">
      {{ price }}
    </p>
  </div>
</a>

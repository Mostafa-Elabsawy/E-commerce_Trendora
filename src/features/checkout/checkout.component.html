
<div class="max-w-6xl mx-auto px-4 py-12">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
    
    <div class="flex flex-col gap-6">
      <div class="text-xl md:text-2xl font-light text-gray-500 uppercase tracking-wider flex items-center gap-2 mb-2">
        <span>DELIVERY</span>
        <span class="text-gray-800 font-medium">INFORMATION</span>
        <!-- <app-title text1="DELIVERY" text2="INFORMATION"></app-title> -->
        <div class="h-[1.5px] w-12 bg-gray-700"></div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input type="text" placeholder="First name" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
        <input type="text" placeholder="Last name" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
      </div>

      <input type="email" placeholder="Email address" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
      <input type="text" placeholder="Street" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input type="text" placeholder="City" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
        <input type="text" placeholder="State" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input type="text" placeholder="Zip code" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
        <input type="text" placeholder="Country" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
      </div>

      <input type="tel" placeholder="Phone" class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full" />
    </div>

    <div class="flex flex-col gap-10">
      
      <div class="w-full flex flex-col gap-4">
        <div class="text-xl md:text-2xl font-light text-gray-500 uppercase tracking-wider flex items-center gap-2">
          <span>CART</span>
          <span class="text-gray-800 font-medium">TOTALS</span>
          <div class="h-[1.5px] w-12 bg-gray-700"></div>
        </div>

        <div class="flex flex-col gap-2 text-sm text-gray-600 pt-2">
          <div class="flex justify-between border-b border-gray-200 pb-2">
            <p>Subtotal</p>
            <p class="font-medium text-gray-800">$60.00</p>
          </div>
          <div class="flex justify-between border-b border-gray-200 pb-2">
            <p>Shipping Free</p>
            <p class="font-medium text-gray-800">$10</p>
          </div>
          <div class="flex justify-between pt-1 text-base font-bold text-gray-900">
            <p>Total</p>
            <p>$70.00</p>
          </div>
        </div>
      </div>

      <div class="w-full flex flex-col gap-4">
        <div class="text-sm md:text-base font-light text-gray-500 uppercase tracking-wider flex items-center gap-2">
          <span>PAYMENT</span>
          <span class="text-gray-800 font-medium">METHOD</span>
          <div class="h-[1.5px] w-12 bg-gray-700"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-2">
          <label class="flex items-center gap-3 border border-gray-200 rounded p-3 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="payment" class="w-4 h-4 accent-blue-600" />
            <img src="../../assets/frontend_assets/stripe_logo.png" class="h-4 object-contain mx-auto" alt="Stripe" />
          </label>

          <label class="flex items-center gap-3 border border-gray-200 rounded p-3 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="payment" class="w-4 h-4 accent-green-600" />
            <img src="../../assets/frontend_assets/razorpay_logo.png" class="h-4 object-contain mx-auto" alt="Razorpay" />
          </label>

          <label class="flex items-center gap-3 border border-gray-200 rounded p-3 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="payment" class="w-4 h-4 accent-gray-800" />
            <span class="text-[10px] md:text-xs font-medium text-gray-400 uppercase tracking-wider whitespace-nowrap mx-auto">
              CASH ON DELIVERY
            </span>
          </label>
        </div>

        <div class="flex justify-end pt-6">
          <button class="bg-black text-white text-xs md:text-sm font-medium tracking-widest uppercase px-12 py-3 active:bg-gray-700 transition-colors">
            PLACE ORDER
          </button>
        </div>
      </div>

    </div>

  </div>
</div>

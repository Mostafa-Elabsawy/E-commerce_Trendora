<div class="flex flex-col lg:flex-row gap-8 py-10">
  <!-- Filters -->
  <div class="w-full lg:w-[280px] flex flex-col gap-5">
    <h2 class="font-bold text-2xl">FILTERS</h2>

    <div class="border border-gray-400 p-4">
      <h2 class="text-black text-xl font-medium mb-4">CATEGORIES</h2>

      <div class="flex flex-col gap-3 text-gray-500">
        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Men</span>
        </label>

        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Women</span>
        </label>

        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Kids</span>
        </label>
      </div>
    </div>

    <div class="border border-gray-400 p-4">
      <h2 class="text-black text-xl font-medium mb-4">TYPE</h2>

      <div class="flex flex-col gap-3 text-gray-500">
        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Topwear</span>
        </label>

        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Bottomwear</span>
        </label>

        <label class="flex gap-2">
          <input type="checkbox" />
          <span>Winterwear</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div class="flex-1">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 px-2 mb-6">
      <app-title text1="ALL" text2="COLLECTIONS" />

      <div class="border border-gray-400 p-2 w-full sm:w-48">
        <select class="w-full outline-none">
          <option>Sort By : Relevant</option>
          <option>Sort By : Low to High</option>
          <option>Sort By : High to Low</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
      <!-- @for (product of products; track $index) {
      <app-product-card [product]="product"></app-product-card>
      } -->
      @for (item of products(); track item.id) {
        <app-product-card [product]="item" />
      } @empty {
        <p class="text-center text-gray-500 col-span-full">There are no products to display.</p>
      }
    </div>
  </div>
</div>

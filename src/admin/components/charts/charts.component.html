<div class="bg-white p-6 rounded-xl border border-slate-200/80 shadow-sm space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h3 class="text-lg font-semibold text-slate-800">Sales & Revenue Performance</h3>
            <p class="text-xs text-slate-400">Track financial metrics and volume generation over time</p>
        </div>

        <div class="inline-flex rounded-lg border border-slate-200 p-1 bg-slate-50 self-start sm:self-auto">
            <button *ngFor="let filter of analyticsFilters" (click)="updateChartFilter(filter)" [ngClass]="activeFilter === filter ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'" class="px-3 py-1.5 text-xs font-semibold rounded-md transition-all">
                {{ filter }}
            </button>
        </div>
    </div>

    <div class="h-80 w-full bg-slate-50 p-4 rounded-lg border border-slate-100 relative">
        <canvas #salesChart></canvas>
    </div>
</div>

<div (click)="cardClick.emit()" class="bg-white p-6 rounded-xl border border-slate-200/80 shadow-sm hover:shadow-md hover:border-indigo-200 cursor-pointer transition-all duration-200 group flex gap-4 items-center justify-between">
    <div class="space-y-2">
        <span class="text-sm font-medium text-slate-500 block">{{ label() }}</span>
        <h3 class="text-3xl font-bold tracking-tight text-slate-900 group-hover:text-indigo-600 transition-colors duration-150">{{ value() }}</h3>
    </div>
    <div class="p-3.5 rounded-lg bg-slate-50 text-slate-600 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-all duration-200">
        <i [class]="'fa-solid ' + icon() + ' text-xl'"></i>
    </div>
</div>
